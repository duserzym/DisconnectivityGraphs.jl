name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version:
          - '1.10'
          - '1'

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@v3

      - name: Run tests
        run: julia --project=. -e 'using Pkg; Pkg.test()'